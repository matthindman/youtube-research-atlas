- id: claim_descriptive_deficit_partial_relational_data_channel_mapping
  text: Because YouTube exposes only partial public relational data, channel and community mapping often has to combine sparse formal traces with qualitative interpretation to define boundaries.
  claim_type: methodological
  evidence_strength: multi-source
  temporal_scope: Late-2019 through 2025 YouTube channel-mapping studies.
  primary_sources:
  - padilla_2026
  supporting_sources:
  - rieder_2020
  - zaitsev_clark_2025
  conflicting_sources: []
  scope_conditions: Evidence comes from large-scale mapping studies that rely on public subscriptions, featured channels, or public commenter traces; it shows that hidden relational data constrain coverage
    and interpretation, not that network mapping is impossible.
  themes:
  - descriptive-deficit
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/padilla_2026.md
  - wiki/themes/descriptive_deficit.md
  - wiki/methods/channel_classification.md
  verification: machine_extracted
- id: claim_governance_data_access_historical_public_research_affordances
  text: Late-2010s YouTube research could use public channel subscriptions, featured-channel links, and high-quota Data API access to map channels at scale, but those affordances later became materially
    harder to obtain or replicate.
  claim_type: methodological
  evidence_strength: single-source
  temporal_scope: Late-2019 to early-2020 YouTube research conditions described in a 2020 mapping study.
  primary_sources:
  - rieder_2020
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: Current support comes from one large-scale crawl paper describing historical research access conditions; later evidence should distinguish quota changes from the separate restriction
    of public subscription visibility.
  themes:
  - descriptive-deficit
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/rieder_2020.md
  - wiki/themes/descriptive_deficit.md
  - wiki/themes/governance_data_access.md
  verification: machine_extracted
- id: claim_governance_data_access_informal_creator_accountability
  text: When formal participation and appeal channels are weak, YouTube creators use public videos and callouts as informal accountability mechanisms, but those efforts provide visibility and solidarity
    more reliably than direct governance power.
  claim_type: empirical-descriptive
  evidence_strength: multi-source
  temporal_scope: English-language creator discourse from 2015-2023, including an August 2022 moderation controversy.
  primary_sources:
  - hallinan_et_al_2025
  supporting_sources:
  - hallinan_reynolds_2024
  - reynolds_hallinan_2024
  conflicting_sources: []
  scope_conditions: Current support comes from English-language creator-centered studies focused on moderation complaints, accountability videos, and copyright-dispute videos rather than on direct platform
    records.
  themes:
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/hallinan_et_al_2025.md
  - wiki/sources/hallinan_reynolds_2024.md
  - wiki/sources/reynolds_hallinan_2024.md
  - wiki/themes/governance_data_access.md
  verification: machine_extracted
- id: claim_governance_data_access_horizontal_vertical_callouts
  text: 'Creator copyright callouts do at least two governance jobs: horizontal peer policing inside creator communities and vertical appeals toward platforms or rights holders.'
  claim_type: empirical-descriptive
  evidence_strength: single-source
  temporal_scope: English-language copyright callout videos published from 2019-2023.
  primary_sources:
  - hallinan_reynolds_2024
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: Current support comes from a targeted keyword-based corpus of 135 English-language copyright callout videos rather than a representative platform sample.
  themes:
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/hallinan_reynolds_2024.md
  - wiki/themes/governance_data_access.md
  verification: machine_extracted
- id: claim_governance_data_access_user_generated_accountability
  text: Creators use publicity, audits, hashtags, and signal boosting as user-generated accountability practices to reveal governance failures and try to force response from YouTube when official channels
    do not resolve them.
  claim_type: theoretical
  evidence_strength: single-source
  temporal_scope: English-language YouTube accountability videos from 2015-2023.
  primary_sources:
  - reynolds_hallinan_2024
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: The concept is derived from creator-made YouTube videos and is strongest as a framework for creator-facing governance disputes rather than a complete theory of all platform accountability.
  themes:
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/reynolds_hallinan_2024.md
  - wiki/themes/governance_data_access.md
  verification: machine_extracted
- id: claim_governance_data_access_media_pressure_policy_change
  text: Across Facebook, Twitter, and YouTube, sustained negative mainstream media coverage is associated with a higher likelihood of subsequent user-policy change.
  claim_type: empirical-descriptive
  evidence_strength: single-source
  temporal_scope: English-language mainstream coverage and platform policy changes from 2005/2007 through early 2021.
  primary_sources:
  - marchal_et_al_2025
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: This is comparative, observational evidence using public-facing policy documents and should not be read as causal proof or as YouTube-only evidence.
  themes:
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
  - wiki/sources/marchal_et_al_2025.md
  - wiki/themes/governance_data_access.md
  verification: machine_extracted
- id: claim_governance_data_access_governance_change_information_quality
  text: Governance and ownership changes can alter platform information quality, as Twitter/X showed a modest but significant shift toward lower-credibility sharing after its October 2022 transition.
  claim_type: empirical-descriptive
  evidence_strength: single-source
  temporal_scope: Twitter/X data from January 2022-April 2023 around the October 27, 2022 ownership transition.
  primary_sources:
  - ozturan_et_al_2025
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: This is comparative evidence from Twitter/X rather than YouTube, and the study does not establish feed exposure or long-run persistence beyond May 2023.
