    creators toward more extreme figures.
  claim_type: empirical-descriptive
  evidence_strength: single-source
  temporal_scope: Guest-appearance network covering January 2017-April 2018 in the pre-2019 YouTube regime.
  primary_sources:
  - lewis_2018
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: Current support comes from a purposive map of an English-language reactionary-right subsystem and from qualitative network analysis rather than platform-wide exposure logs or direct
    recommendation traces.
