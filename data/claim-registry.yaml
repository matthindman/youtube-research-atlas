# Claim registry for the YouTube Scholarship Atlas.
#
# Lightweight index of the ~30-50 most important cross-cutting claims
# that appear across multiple pages. NOT a comprehensive claim database.
# The purpose is to prevent silent duplication, track contradictions,
# and ensure that core propositions are stated consistently.
#
# Fields:
#   id:                    slug
#   text:                  canonical statement of the claim
#   claim_type:            empirical-descriptive | empirical-causal
#                          | methodological | theoretical | normative
#   evidence_strength:     single-source | multi-source | contested
#   temporal_scope:        when does this claim hold?
#   primary_sources:       list of source_ids driving the claim
#   supporting_sources:    list of source_ids with consistent findings
#   conflicting_sources:   list of source_ids with contrary findings
#   scope_conditions:      boundary conditions / limitations
#   themes:                theme slugs from project-taxonomy.yaml
#   census_papers:         paper_targets this claim feeds
#   appears_in:            list of wiki page paths where this claim lives
#   verification:          machine_extracted | human_checked
#                          | publication_ready
#
# Populated during and after Phase 1 ingest. Target: ~30 entries after
# Phase 1 completes.

claims:
  - id: claim_descriptive_deficit_denominator_problem
    text: "Without platform-wide denominators or representative samples, prevalence claims about YouTube content cannot be interpreted credibly."
    claim_type: methodological
    evidence_strength: single-source
    temporal_scope: "Persistent platform-level problem documented in late-2022 scholarship."
    primary_sources:
      - mcgrady_2023
    supporting_sources: []
    conflicting_sources: []
    scope_conditions: "Especially acute for studies built from convenience, seed-based, or recommendation-based samples."
    themes:
      - descriptive-deficit
    census_papers:
      - methods-companion
      - paper1-attention-economy
    appears_in:
      - wiki/sources/mcgrady_2023.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
  - id: claim_descriptive_deficit_multilingual_misrepresentation
    text: "English-centric or user-experienced views of YouTube are not representative of the platform's broader linguistic composition."
    claim_type: methodological
    evidence_strength: multi-source
    temporal_scope: "Late-2022 through 2024 random-sample evidence; precise language shares remain uncertain."
    primary_sources:
      - mcgrady_2023
    supporting_sources:
      - mcgrady_2025
    conflicting_sources: []
    scope_conditions: "Current support is directional because the paper flags meaningful language-detection error."
    themes:
      - descriptive-deficit
      - cross-linguistic-variation
    census_papers:
      - methods-companion
      - study5-cross-language
    appears_in:
      - wiki/sources/mcgrady_2023.md
      - wiki/sources/mcgrady_2025.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
  - id: claim_descriptive_deficit_quantitative_description_priority
    text: "Rigorous quantitative description of what YouTube is should be treated as a core research task, not as a secondary afterthought to causal studies."
    claim_type: methodological
    evidence_strength: multi-source
    temporal_scope: "Early-2020s diagnosis of the YouTube research agenda."
    primary_sources:
      - munger_2024
    supporting_sources:
      - munger_et_al_2025
    conflicting_sources: []
    scope_conditions: "This is an agenda-setting claim rather than a full-platform empirical estimate."
    themes:
      - descriptive-deficit
    census_papers:
      - methods-companion
      - paper1-attention-economy
    appears_in:
      - wiki/sources/munger_2024.md
      - wiki/sources/munger_et_al_2025.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
  - id: claim_descriptive_deficit_understudied_platform
    text: "YouTube is understudied relative to its social and political importance."
    claim_type: theoretical
    evidence_strength: multi-source
    temporal_scope: "Early-2020s state of the field."
    primary_sources:
      - munger_2024
    supporting_sources:
      - munger_et_al_2025
      - norton_shapiro_2024
    conflicting_sources: []
    scope_conditions: "Current support here is agenda-setting and comparative rather than a formal bibliometric census."
    themes:
      - descriptive-deficit
    census_papers:
      - methods-companion
      - paper1-attention-economy
      - study3-media-system
    appears_in:
      - wiki/sources/munger_2024.md
      - wiki/sources/munger_et_al_2025.md
      - wiki/sources/norton_shapiro_2024.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
  - id: claim_descriptive_deficit_infrastructure_constraints
    text: "Data access limits and insufficient shared tooling or compute capacity materially constrain large-scale YouTube research."
    claim_type: methodological
    evidence_strength: multi-source
    temporal_scope: "Early-2020s research environment."
    primary_sources:
      - munger_et_al_2025
    supporting_sources:
      - norton_shapiro_2024
    conflicting_sources: []
    scope_conditions: "Anchored by primary empirical evidence on API constraints and supplemented by commentary on wider tooling and infrastructure deficits."
    themes:
      - descriptive-deficit
      - governance-data-access
    census_papers:
      - methods-companion
      - study3-media-system
    appears_in:
      - wiki/sources/norton_shapiro_2024.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
  - id: claim_cross_linguistic_youtube_not_one_platform
    text: "Different linguistic communities use YouTube differently enough that English-language findings should not be assumed to generalize across the platform."
    claim_type: empirical-descriptive
    evidence_strength: single-source
    temporal_scope: "Cross-language random samples describing uploads through 2023."
    primary_sources:
      - mcgrady_2025
    supporting_sources: []
    conflicting_sources: []
    scope_conditions: "Current evidence comes from English, Spanish, Hindi, and Russian random samples rather than all languages on the platform."
    themes:
      - descriptive-deficit
      - cross-linguistic-variation
    census_papers:
      - paper1-attention-economy
      - study5-cross-language
    appears_in:
      - wiki/sources/mcgrady_2025.md
      - wiki/themes/descriptive_deficit.md
    verification: human_checked
