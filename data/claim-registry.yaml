    review.
  claim_type: methodological
  evidence_strength: single-source
  temporal_scope: Post-October 29, 2025 EU DSA regime.
  primary_sources:
  - european_commission_2025
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: This is a policy fact from an official announcement about the formal access mechanism, not evidence yet about take-up, consistency, or research payoff in practice.
  themes:
  - governance-data-access
  census_papers:
  - methods-companion
  - study3-media-system
  appears_in:
