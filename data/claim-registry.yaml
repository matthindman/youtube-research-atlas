# Claim registry for the YouTube Scholarship Atlas.
#
# Lightweight index of the ~30-50 most important cross-cutting claims
# that appear across multiple pages. NOT a comprehensive claim database.
# The purpose is to prevent silent duplication, track contradictions,
# and ensure that core propositions are stated consistently.
#
# Fields:
#   id:                    slug
#   text:                  canonical statement of the claim
#   claim_type:            empirical-descriptive | empirical-causal
#                          | methodological | theoretical | normative
#   evidence_strength:     single-source | multi-source | contested
#   temporal_scope:        when does this claim hold?
#   primary_sources:       list of source_ids driving the claim
#   supporting_sources:    list of source_ids with consistent findings
#   conflicting_sources:   list of source_ids with contrary findings
#   scope_conditions:      boundary conditions / limitations
#   themes:                theme slugs from project-taxonomy.yaml
#   census_papers:         paper_targets this claim feeds
#   appears_in:            list of wiki page paths where this claim lives
#   verification:          machine_extracted | human_checked
#                          | publication_ready
#
# VERIFICATION DEFAULT: every new or updated claim-registry entry
# starts at `verification: machine_extracted`, regardless of how the
# underlying source card is marked. Upgrading a registry entry to
# `human_checked` or `publication_ready` is a HUMAN action performed
# during PR review or the quality calibration pause. Agents must not
# upgrade these fields, even when ingesting via ingest-from-review.
#
# Populated during and after Phase 1 ingest. Target: ~30 entries after
# Phase 1 completes.

claims:
  - id: claim_news_ecosystem_commentary_dominance
    text: "News creator ecosystems on social and video platforms are dominated by commentary formats rather than original reporting."
    claim_type: empirical-descriptive
    evidence_strength: single-source
    temporal_scope: "Audience survey snapshot in 2024-2025 across 24 countries."
    primary_sources:
      - newman_et_al_2025
    supporting_sources: []
    conflicting_sources: []
    scope_conditions: "Current support comes from audience-reported attention and creator typology rather than direct exposure logs."
    themes:
      - news-ecosystem
      - creator-economy
    census_papers:
      - paper1-attention-economy
      - study3-media-system
    appears_in:
      - wiki/sources/newman_et_al_2025.md
      - wiki/themes/news_ecosystem.md
    verification: machine_extracted
  - id: claim_news_ecosystem_creator_gender_imbalance
    text: "Top news creator and influencer ecosystems are overwhelmingly male across countries."
    claim_type: empirical-descriptive
    evidence_strength: single-source
    temporal_scope: "Audience survey snapshot in 2024-2025 across 24 countries."
    primary_sources:
      - newman_et_al_2025
    supporting_sources: []
    conflicting_sources: []
    scope_conditions: "The underlying top-15 lists are indicative and survey-based, not exhaustive rosters of all creators."
    themes:
      - news-ecosystem
      - creator-economy
    census_papers:
      - paper1-attention-economy
      - study3-media-system
    appears_in:
      - wiki/sources/newman_et_al_2025.md
      - wiki/themes/news_ecosystem.md
    verification: machine_extracted
