- id: claim_recommendation_radicalization_radical_consumption_concentrated_small_predisposed_minority
  text: In late-2010s U.S. browsing data, radical and far-right YouTube consumption was concentrated among a small, already predisposed minority rather than being systematically generated by YouTube recommendations
    for average users.
  claim_type: empirical-descriptive
  evidence_strength: single-source
  temporal_scope: Nationally representative U.S. desktop browsing histories from January 2016-December 2019.
  primary_sources:
  - hosseinmardi_et_al_2021
  supporting_sources: []
  conflicting_sources: []
  scope_conditions: Current support comes from realized desktop browsing behavior and session-entry analysis; the study does not observe mobile use or the full recommendation menu that users ignored.
